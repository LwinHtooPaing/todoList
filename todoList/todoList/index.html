<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todoList</title>
  </head>
  <body>
    <div class="min-h-screen bg-zinc-950 p-10">
      <div
        class="w-full max-w-md sm:max-w-[550px] min-h-[640px] m-auto bg-zinc-900 border border-zinc-800 rounded-3xl shadow-2xl overflow-hidden"
      >
        <!-- Header -->
        <div class="p-6 border-b border-zinc-800">
          <h1 class="text-3xl font-bold font-serif text-white">Todo List</h1>
          <p class="text-zinc-400 mt-1 font-serif text-sm">
            Organize your daily tasks efficiently.
          </p>
        </div>

        <!-- Input -->
        <div class="p-6">
          <div class="flex gap-3">
            <input
              id="inputTask"
              type="text"
              placeholder="Add a new task..."
              class="flex-1 bg-zinc-800 text-white font-serif placeholder:text-zinc-500 px-5 py-4 rounded-2xl outline-none border border-zinc-700 focus:border-zinc-500 transition"
            />

            <button
              id="addBtn"
              class="bg-white text-black px-5 rounded-2xl font-serif hover:scale-105 active:scale-100 transition w-[100px]"
            >
              Add
            </button>
          </div>
          <div class="flex justify-between mt-3">
            <h1 class="text-white font-serif text-2xl">Lists</h1>
            <p
              class="bg-white w-[50px] p-1 justify-center flex rounded-2xl h-[30px]"
            >
              <span id="doneTotalTask">0</span> <span>/</span>
              <span id="totalTask">0</span>
            </p>
          </div>
        </div>

        <!-- Todo Items -->
        <div
          class="p-6 overflow-y-auto max-h-[400px] scrollbar scrollbar-thin scrollbar-track-zinc-800"
          id="listGroup"
        >
          <!-- Completed -->

          <!-- Active -->

          <!-- Active -->
        </div>
        <div class="p-5 mb-1" id="noList">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-50 m-auto text-white"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184"
            />
          </svg>
          <h1 class="text-center font-serif text-white">There's no list yet</h1>
        </div>
      </div>
      <div class="rounded-xl flex justify-center font-serif">
        <button class="bg-white flex p-2 gap-3 mt-5 hidden" id="deleteAllBtn">
          DeleteAll
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9.75 14.25 12m0 0 2.25 2.25M14.25 12l2.25-2.25M14.25 12 12 14.25m-2.58 4.92-6.374-6.375a1.125 1.125 0 0 1 0-1.59L9.42 4.83c.21-.211.497-.33.795-.33H19.5a2.25 2.25 0 0 1 2.25 2.25v10.5a2.25 2.25 0 0 1-2.25 2.25h-9.284c-.298 0-.585-.119-.795-.33Z"
            />
          </svg>
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script src="./node_modules/preline/dist/preline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <template id="todoTemplate">
      <div
        class="bg-zinc-800 mt-3 todoListTemplateCard rounded-2xl p-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-4">
          <input type="checkbox" class="size-5 checkBox accent-black" />

          <div class="textPart items-center">
            <p class="text-stone-200 font-serif" id="todoText">
              Finish portfolio design
            </p>
          </div>
        </div>

        <div class="w-[100px] flex gap-7 buttons">
          <button class="editBtn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6 text-white pointer-events-none"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
              />
            </svg>
          </button>
          <button class="deleteBtn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6 text-white pointer-events-none"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
              />
            </svg>
          </button>
        </div>
      </div>
    </template>
  </body>
</html>
